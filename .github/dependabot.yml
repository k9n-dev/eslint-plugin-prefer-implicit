# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# Basic `dependabot.yml` file with
# minimum configuration for three package managers

version: 2
updates:
  # Root package (ESLint plugin)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      typescript-ecosystem:
        patterns:
          - "typescript"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "fast-check"
      changesets:
        patterns:
          - "@changesets/*"

  # Docs (Docusaurus)
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "chore(docs)"
      include: "scope"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "docusaurus"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
